openapi: 3.1.0
info:
  title: Api
  version: 0.2.0
  description: Sasuty SNS API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
  - name: auth
  - name: posts
  - name: users
  - name: feed
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/sync:
    post:
      operationId: syncUser
      tags: [auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserSyncInput"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /posts:
    get:
      operationId: listPosts
      tags: [posts]
      parameters:
        - name: cursor
          in: query
          schema:
            type: ["string", "null"]
        - name: limit
          in: query
          schema:
            type: ["integer", "null"]
        - name: feed
          in: query
          schema:
            type: ["string", "null"]
            enum: ["forYou", "following", null]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PostsPage"
    post:
      operationId: createPost
      tags: [posts]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PostInput"
      responses:
        "201":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Post"

  /posts/{id}:
    get:
      operationId: getPost
      tags: [posts]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Post"
        "404":
          description: Not found
    delete:
      operationId: deletePost
      tags: [posts]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /posts/{id}/replies:
    get:
      operationId: getPostReplies
      tags: [posts]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Post"
    post:
      operationId: createReply
      tags: [posts]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReplyInput"
      responses:
        "201":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Post"

  /posts/{id}/like:
    post:
      operationId: toggleLike
      tags: [posts]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LikeStatus"

  /posts/{id}/repost:
    post:
      operationId: toggleRepost
      tags: [posts]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RepostStatus"

  /posts/{id}/view:
    post:
      operationId: recordView
      tags: [posts]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /users/me:
    patch:
      operationId: updateMyProfile
      tags: [users]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserUpdate"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /users/by-username/{username}:
    get:
      operationId: getUserByUsername
      tags: [users]
      parameters:
        - name: username
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "404":
          description: Not found

  /users/recommended:
    get:
      operationId: getRecommendedUsers
      tags: [users]
      summary: Get recommended users to follow
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"

  /users/{userId}:
    get:
      operationId: getUser
      tags: [users]
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "404":
          description: Not found

  /users/{userId}/posts:
    get:
      operationId: getUserPosts
      tags: [users]
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Post"

  /users/{userId}/followers:
    get:
      operationId: getUserFollowers
      tags: [users]
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"

  /users/{userId}/following:
    get:
      operationId: getUserFollowing
      tags: [users]
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"

  /users/{userId}/follow:
    post:
      operationId: toggleFollow
      tags: [users]
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FollowStatus"

  /feed:
    get:
      operationId: getFeed
      tags: [feed]
      parameters:
        - name: cursor
          in: query
          schema:
            type: ["string", "null"]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PostsPage"

  /trending:
    get:
      operationId: getTrending
      tags: [feed]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TrendingData"

  /search:
    get:
      operationId: search
      tags: [feed]
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
        - name: type
          in: query
          schema:
            type: string
            enum: [posts, users, all]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SearchResults"

  /notifications:
    get:
      operationId: getNotifications
      tags: [users]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Notification"

  /notifications/read:
    post:
      operationId: markNotificationsRead
      tags: [users]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    User:
      type: object
      required: [id, username, displayName, createdAt, followersCount, followingCount, postsCount, language]
      properties:
        id:
          type: string
        username:
          type: string
        displayName:
          type: string
        bio:
          type: ["string", "null"]
        avatarUrl:
          type: ["string", "null"]
        bannerUrl:
          type: ["string", "null"]
        location:
          type: ["string", "null"]
        birthday:
          type: ["string", "null"]
        website:
          type: ["string", "null"]
        language:
          type: string
        createdAt:
          type: string
        followersCount:
          type: integer
        followingCount:
          type: integer
        postsCount:
          type: integer
        isFollowing:
          type: ["boolean", "null"]
        isMe:
          type: ["boolean", "null"]

    UserSyncInput:
      type: object
      required: [id, email]
      properties:
        id:
          type: string
        email:
          type: string
        username:
          type: ["string", "null"]
        displayName:
          type: ["string", "null"]
        avatarUrl:
          type: ["string", "null"]

    UserUpdate:
      type: object
      properties:
        displayName:
          type: string
        bio:
          type: string
        avatarUrl:
          type: string
        bannerUrl:
          type: string
        username:
          type: string
        location:
          type: string
        birthday:
          type: string
        website:
          type: string
        language:
          type: string

    Post:
      type: object
      required: [id, content, userId, createdAt, likesCount, repliesCount, repostsCount, viewsCount]
      properties:
        id:
          type: integer
        content:
          type: string
        userId:
          type: string
        user:
          $ref: "#/components/schemas/User"
        replyToId:
          type: ["integer", "null"]
        repostOfId:
          type: ["integer", "null"]
        imageUrl:
          type: ["string", "null"]
        linkUrl:
          type: ["string", "null"]
        linkTitle:
          type: ["string", "null"]
        linkDescription:
          type: ["string", "null"]
        replyToPost:
          $ref: "#/components/schemas/PostPreview"
        repostOf:
          $ref: "#/components/schemas/PostPreview"
        createdAt:
          type: string
        likesCount:
          type: integer
        repliesCount:
          type: integer
        repostsCount:
          type: integer
        viewsCount:
          type: integer
        isLiked:
          type: ["boolean", "null"]
        isReposted:
          type: ["boolean", "null"]
        hashtags:
          type: array
          items:
            type: string

    PostPreview:
      type: object
      required: [id, content, userId]
      properties:
        id:
          type: integer
        content:
          type: string
        userId:
          type: string
        user:
          $ref: "#/components/schemas/User"

    PostInput:
      type: object
      required: [content]
      properties:
        content:
          type: string
          minLength: 1
          maxLength: 280
        imageUrl:
          type: ["string", "null"]
        linkUrl:
          type: ["string", "null"]
        linkTitle:
          type: ["string", "null"]
        linkDescription:
          type: ["string", "null"]

    ReplyInput:
      type: object
      required: [content]
      properties:
        content:
          type: string
          minLength: 1
          maxLength: 280

    PostsPage:
      type: object
      required: [posts, hasMore]
      properties:
        posts:
          type: array
          items:
            $ref: "#/components/schemas/Post"
        hasMore:
          type: boolean
        nextCursor:
          type: ["string", "null"]

    LikeStatus:
      type: object
      required: [liked, likesCount]
      properties:
        liked:
          type: boolean
        likesCount:
          type: integer

    RepostStatus:
      type: object
      required: [reposted, repostsCount]
      properties:
        reposted:
          type: boolean
        repostsCount:
          type: integer

    FollowStatus:
      type: object
      required: [following]
      properties:
        following:
          type: boolean

    TrendingData:
      type: object
      required: [hashtags, posts]
      properties:
        hashtags:
          type: array
          items:
            $ref: "#/components/schemas/TrendingHashtag"
        posts:
          type: array
          items:
            $ref: "#/components/schemas/Post"

    TrendingHashtag:
      type: object
      required: [tag, count]
      properties:
        tag:
          type: string
        count:
          type: integer

    SearchResults:
      type: object
      required: [posts, users]
      properties:
        posts:
          type: array
          items:
            $ref: "#/components/schemas/Post"
        users:
          type: array
          items:
            $ref: "#/components/schemas/User"

    Notification:
      type: object
      required: [id, type, createdAt, isRead]
      properties:
        id:
          type: integer
        type:
          type: string
          enum: [like, reply, follow, repost]
        actorId:
          type: ["string", "null"]
        actor:
          $ref: "#/components/schemas/User"
        postId:
          type: ["integer", "null"]
        post:
          $ref: "#/components/schemas/PostPreview"
        createdAt:
          type: string
        isRead:
          type: boolean
